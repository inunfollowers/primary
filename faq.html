<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #ff7eb3 0px, #ff7eb3 20px, #ff7eb3 20.001px, #8e44ad calc(100% - 20.001px), #8e44ad calc(100% - 20px), #8e44ad 100%);
            font-family: "Vazirmatn", sans-serif;
            font-weight: 800;
            box-sizing: border-box;
            direction: rtl;
            text-align: right;
        }

        .header, .faq-container, .faq-button, .footer {
            box-sizing: border-box;
        }

        .header, .faq-container, .footer {
            width: 85%;
            max-width: 550px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            text-align: center;
            color: white;
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }

        .header h1 {
            margin: 5px 0;
            font-size: 22px; /* مناسب برای موبایل */
        }

        .header p {
            margin: 5px 0;
            font-size: 14px; /* مناسب برای موبایل */
        }

        .faq-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
        }

        .faq-button {
            width: 95%;
            padding: 18px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            text-align: right;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
            font-size: 16px;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
            color: white;
            font-family: "Vazirmatn", sans-serif;
            font-weight: 800;
        }

        .faq-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .footer {
            text-align: center;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .footer a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>سوالات متداول (FAQ)</h1>
        <p>آنفالویاب اینستاگرام - Unfollowers Instagram</p>
    </header>

    <main class="faq-container">
        <button class="faq-button" onclick="window.location.href='link1.html'">آنفالویاب چیست؟</button>
        <button class="faq-button" onclick="window.location.href='link2.html'">هدف از استفاده آنفالویاب چیست؟ </button>
        <button class="faq-button" onclick="window.location.href='link3.html'">آنفالویاب برای چه کسانی مناسب است؟</button>
        <button class="faq-button" onclick="window.location.href='link4.html'">آیا استفاده از آنفالویاب ما برای حساب کاربری شما امن است؟</button>
        <button class="faq-button" onclick="window.location.href='link5.html'">آیا استفاده از آنفالویاب ما باعث دیسیبل شدن حساب اینستاگرام
            شما میشود؟</button>
        <button class="faq-button" onclick="window.location.href='link6.html'">آیا آنفالویاب ما برای همه دستگاه‌ها قابل اجراست؟</button>
        <button class="faq-button" onclick="window.location.href='link7.html'">آیا نیازمند نصب اپلیکیشن است؟</button>
        <button class="faq-button" onclick="window.location.href='link8.html'">چرا دریافت اطلاعات شما الزامی است؟</button>
        <button class="faq-button" onclick="window.location.href='link9.html'">ثبات و به‌روزرسانی لیست آنفالوورها</button>
        <button class="faq-button" onclick="window.location.href='link10.html'">چرا خدمات ما به‌صورت رایگان ارائه نمیشود؟</button>
        <button class="faq-button" onclick="window.location.href='link11.html'">تعرفه‌های ارائه خدمات</button>
        <button class="faq-button" onclick="window.location.href='link12.html'">چگونه میتوانم از صحت و اعتبار خدمات شما اطمینان حاصل کنم؟</button>
        <button class="faq-button" onclick="window.location.href='link13.html'">چگونه میتوانم درخواست پشتیبانی کنم؟</button>
        <button class="faq-button" onclick="window.location.href='link14.html'">ساعات کاری پشتیبانی شما چه زمانی است؟</button>
        <button class="faq-button" onclick="window.location.href='link15.html'">آیا خدمات پشتیبانی شما هزینه دارد؟
        </button>
    </main>

    <footer class="footer">
        <p>از اینکه با ما همراه هستید، سپاسگزاریم!</p>
        <p><a href="https://t.me/inunfollowersbot" target="_blank">https://t.me/inunfollowersbot</a></p>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.Telegram && window.Telegram.WebApp) {
                // آماده کردن وب اپلیکیشن تلگرام
                window.Telegram.WebApp.ready();

                // تنظیم رنگ سربرگ
                window.Telegram.WebApp.headerColor = "#ff7eb3";

                // تنظیم رنگ پس‌زمینه
                window.Telegram.WebApp.backgroundColor = "#ff7eb3";

                // تنظیم رنگ نوار پایین
                window.Telegram.WebApp.bottomBarColor = "#8e44ad";
            }
        });
    </script>
</body>
</html>
